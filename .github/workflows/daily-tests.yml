name: Daily Playwright tests

on:
  schedule:
    # GitHub Actions cron is UTC only.
    # 07:30 America/New_York is either 12:30 UTC (during EDT) or 13:30 UTC (during EST),
    # so we trigger at both and gate the job by checking NY local time.
    - cron: "30 12 * * *"
    - cron: "30 13 * * *"
  workflow_dispatch: {}

jobs:
  test-and-email:
    runs-on: ubuntu-latest

    steps:
      - name: Guard: run only at 07:30 ET
        id: guard
        shell: bash
        run: |
          set -euo pipefail
          now="$(TZ=America/New_York date +%H:%M)"
          if [ "$now" = "07:30" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Skipping: NY local time is $now (not 07:30)."
          fi

      - name: Checkout
        if: ${{ steps.guard.outputs.run == 'true' }}
        uses: actions/checkout@v4

      - name: Setup Node
        if: ${{ steps.guard.outputs.run == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: ${{ steps.guard.outputs.run == 'true' }}
        run: npm ci

      - name: Install Playwright browsers
        if: ${{ steps.guard.outputs.run == 'true' }}
        run: npx playwright install --with-deps chromium

      - name: Run tests
        if: ${{ steps.guard.outputs.run == 'true' }}
        id: tests
        continue-on-error: true
        run: |
          set -euo pipefail
          npm test 2>&1 | tee playwright-report/summary.txt

      - name: Determine status
        if: ${{ steps.guard.outputs.run == 'true' }}
        id: status
        run: |
          if [ "${{ steps.tests.outcome }}" = "success" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload Playwright report
        if: ${{ always() && steps.guard.outputs.run == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 14

      - name: Email results (Gmail SMTP)
        if: ${{ always() && steps.guard.outputs.run == 'true' }}
        env:
          TEST_STATUS: ${{ steps.status.outputs.status }}
          SMTP_HOST: smtp.gmail.com
          SMTP_PORT: "587"
          SMTP_USER: ${{ secrets.GMAIL_SMTP_USER }}
          SMTP_PASS: ${{ secrets.GMAIL_SMTP_PASS }}
          MAIL_TO: vladislav.samoylov@dataart.com
          SUBJECT_PREFIX: "[Daily Playwright]"
        run: node scripts/send-smtp-report.mjs

      - name: Fail job if tests failed
        if: ${{ steps.guard.outputs.run == 'true' && steps.tests.outcome != 'success' }}
        run: exit 1

