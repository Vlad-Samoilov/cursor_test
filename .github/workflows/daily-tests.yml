name: Daily Playwright tests

"on":
  schedule:
    # TEMP: every 10 minutes to verify schedule triggers.
    # Once we see `schedule` runs firing, we’ll switch back to the desired daily time.
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  test-and-email:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run tests
        id: tests
        continue-on-error: true
        run: |
          set -euo pipefail
          mkdir -p playwright-report test-results
          npm test 2>&1 | tee playwright-summary.txt

      - name: Determine status
        id: status
        run: |
          if [ "${{ steps.tests.outcome }}" = "success" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 14

      - name: Email results (Gmail SMTP)
        if: always()
        env:
          TEST_STATUS: ${{ steps.status.outputs.status }}
          SMTP_HOST: smtp.gmail.com
          SMTP_PORT: "587"
          SMTP_USER: ${{ secrets.GMAIL_SMTP_USER }}
          SMTP_PASS: ${{ secrets.GMAIL_SMTP_PASS }}
          MAIL_TO: vladislav.samoylov@dataart.com
          SUBJECT_PREFIX: "[Daily Playwright]"
        run: node scripts/send-smtp-report.mjs

      - name: Fail job if tests failed
        if: ${{ steps.tests.outcome != 'success' }}
        run: exit 1

