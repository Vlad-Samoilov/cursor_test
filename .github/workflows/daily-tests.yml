name: Allianz smoke daily tests

on:
  workflow_dispatch: {}

jobs:
  test-and-email:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run tests
        id: tests
        continue-on-error: true
        run: |
          set -euo pipefail
          mkdir -p playwright-report test-results
          npm test 2>&1 | tee playwright-summary.txt

      - name: Detect retries / flaky tests
        id: flake
        if: always()
        run: |
          set -euo pipefail
          flaky=0
          # Playwright often prints either "N flaky" or "Retry #N" markers.
          if [ -f playwright-summary.txt ]; then
            if grep -Eiq '\b[0-9]+\s+flaky\b' playwright-summary.txt; then
              flaky="$(grep -Eio '\b[0-9]+\s+flaky\b' playwright-summary.txt | head -n 1 | grep -Eo '[0-9]+' || echo 1)"
            elif grep -Eiq 'Retry #\d+' playwright-summary.txt; then
              flaky=1
            fi
          fi
          echo "flaky_count=$flaky" >> "$GITHUB_OUTPUT"

      - name: Determine status
        id: status
        run: |
          if [ "${{ steps.tests.outcome }}" = "success" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
          fi

      - name: Run timestamp for email
        id: run_time
        if: always()
        run: echo "iso=$(date -u +'%Y-%m-%d %H:%M UTC')" >> "$GITHUB_OUTPUT"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 14

      - name: Email results (Gmail SMTP)
        if: always()
        env:
          TEST_STATUS: ${{ steps.status.outputs.status }}
          FLAKY_COUNT: ${{ steps.flake.outputs.flaky_count }}
          RUN_DISPLAY_TIME: ${{ steps.run_time.outputs.iso }}
          ARTIFACTS_PAGE_URL: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts"
          SMTP_HOST: smtp.gmail.com
          SMTP_PORT: "587"
          SMTP_USER: ${{ secrets.GMAIL_SMTP_USER }}
          SMTP_PASS: ${{ secrets.GMAIL_SMTP_PASS }}
          MAIL_TO: vladislav.samoylov@dataart.com
          SUBJECT_PREFIX: "[Allianz smoke daily tests]"
        run: node scripts/send-smtp-report.mjs

      - name: Fail job if tests failed
        if: ${{ steps.tests.outcome != 'success' }}
        run: exit 1

